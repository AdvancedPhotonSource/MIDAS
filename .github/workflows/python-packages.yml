name: Python Packages (test + publish)

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - '.github/workflows/python-packages.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/**'
  release:
    types: [published]

jobs:
  # ─── Tests run on every push / PR / release for ALL packages ─────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.12']
        package:
          - midas_stress
          - midas_params
          - midas_peakfit
          - midas_integrate
          - midas_hkls
          - midas_calibrate
          - midas_diffract
          - midas_index
          - midas_transforms
          - midas_nf_preprocess
          - midas_process_grains
          - midas_fit_grain
          - midas_nf_fitorientation
          - midas_nf_pipeline
          - midas_parsl_configs
          - midas_ff_pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # midas_calibrate depends on three sibling MIDAS packages that may not
      # yet be on PyPI (or that we want to test against the in-repo version,
      # not the published one).  Install them as editable from the checkout
      # first so the dependency resolver finds them locally.
      - name: Install in-repo sibling MIDAS packages (midas_calibrate only)
        if: matrix.package == 'midas_calibrate'
        run: |
          pip install -e packages/midas_hkls
          pip install -e packages/midas_integrate
          pip install -e packages/midas_peakfit

      # midas_index depends on midas_stress (>=0.5.0) and midas_diffract
      # (>=0.1.1). Both may not yet be on PyPI at those versions; install
      # the in-repo dev versions first so the resolver finds them locally.
      - name: Install in-repo sibling MIDAS packages (midas_index only)
        if: matrix.package == 'midas_index'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_diffract

      # midas_transforms depends on midas_calibrate (>=0.2.1), which itself
      # depends on midas_hkls / midas_integrate / midas_peakfit. Install the
      # whole chain editably so the resolver finds them locally.
      - name: Install in-repo sibling MIDAS packages (midas_transforms only)
        if: matrix.package == 'midas_transforms'
        run: |
          pip install -e packages/midas_hkls
          pip install -e packages/midas_integrate
          pip install -e packages/midas_peakfit
          pip install -e packages/midas_calibrate

      # midas_nf_preprocess depends on midas-diffract (>=0.1.0) and
      # midas-stress (>=0.6.0). Install the in-repo dev versions so the
      # resolver finds them locally.
      - name: Install in-repo sibling MIDAS packages (midas_nf_preprocess only)
        if: matrix.package == 'midas_nf_preprocess'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_diffract

      # midas_process_grains depends on midas-stress, midas-hkls,
      # midas-diffract, midas-transforms, and midas-index. midas-transforms
      # transitively pulls in midas_calibrate and its chain, so install the
      # full chain editably.
      - name: Install in-repo sibling MIDAS packages (midas_process_grains only)
        if: matrix.package == 'midas_process_grains'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_hkls
          pip install -e packages/midas_diffract
          pip install -e packages/midas_integrate
          pip install -e packages/midas_peakfit
          pip install -e packages/midas_calibrate
          pip install -e packages/midas_transforms
          pip install -e packages/midas_index

      # midas_fit_grain depends on midas-diffract and midas-params.
      - name: Install in-repo sibling MIDAS packages (midas_fit_grain only)
        if: matrix.package == 'midas_fit_grain'
        run: |
          pip install -e packages/midas_params
          pip install -e packages/midas_diffract

      # midas_nf_fitorientation depends on midas-diffract and midas-stress.
      - name: Install in-repo sibling MIDAS packages (midas_nf_fitorientation only)
        if: matrix.package == 'midas_nf_fitorientation'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_diffract

      # midas_nf_pipeline depends on midas-hkls, midas-stress,
      # midas-nf-preprocess, and midas-nf-fitorientation. The latter two
      # transitively need midas-diffract / midas-stress, so install the
      # whole chain editably.
      - name: Install in-repo sibling MIDAS packages (midas_nf_pipeline only)
        if: matrix.package == 'midas_nf_pipeline'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_diffract
          pip install -e packages/midas_hkls
          pip install -e packages/midas_nf_preprocess
          pip install -e packages/midas_nf_fitorientation

      # midas_ff_pipeline is the umbrella package; it pulls in basically
      # every FF-side MIDAS package. Install the full transitive editable
      # chain so the resolver finds all dev versions locally.
      - name: Install in-repo sibling MIDAS packages (midas_ff_pipeline only)
        if: matrix.package == 'midas_ff_pipeline'
        run: |
          pip install -e packages/midas_stress
          pip install -e packages/midas_params
          pip install -e packages/midas_hkls
          pip install -e packages/midas_integrate
          pip install -e packages/midas_peakfit
          pip install -e packages/midas_calibrate
          pip install -e packages/midas_diffract
          pip install -e packages/midas_transforms
          pip install -e packages/midas_index
          pip install -e packages/midas_fit_grain
          pip install -e packages/midas_process_grains
          pip install -e packages/midas_parsl_configs

      # midas_parsl_configs has no MIDAS sibling deps; nothing to install
      # here. (Listed for completeness — the matrix branch is a no-op.)

      - name: Install ${{ matrix.package }} (editable, with dev extras)
        run: pip install -e "packages/${{ matrix.package }}[dev]"

      - name: Run tests for ${{ matrix.package }}
        run: |
          cd packages/${{ matrix.package }}
          # `slow`-marked tests (midas-index regression vs C IndexerOMP)
          # depend on the C binaries which CI doesn't build; skipif handles
          # that, but we exclude them explicitly here for speed.
          python -m pytest tests/ -v --tb=short -m "not slow"

  # ─── Build + publish: triggered by GitHub release only ────────────────────
  # The tag name selects which package to publish:
  #   midas-stress-v*        → midas_stress
  #   midas-params-v*        → midas_params
  #   midas-peakfit-v*       → midas_peakfit
  #   midas-integrate-v*     → midas_integrate
  #   midas-hkls-v*          → midas_hkls
  #   midas-calibrate-v*     → midas_calibrate
  #   midas-diffract-v*      → midas_diffract
  #   midas-index-v*         → midas_index
  #   midas-transforms-v*       → midas_transforms
  #   midas-nf-preprocess-v*    → midas_nf_preprocess
  #   midas-process-grains-v*   → midas_process_grains
  #   midas-fit-grain-v*        → midas_fit_grain
  #   midas-nf-fitorientation-v* → midas_nf_fitorientation
  #   midas-nf-pipeline-v*      → midas_nf_pipeline
  #   midas-parsl-configs-v*    → midas_parsl_configs
  #   midas-ff-pipeline-v*      → midas_ff_pipeline
  #
  # Release tags without one of these prefixes are ignored (no-op build).
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    outputs:
      package: ${{ steps.which.outputs.package }}
      pypi_name: ${{ steps.which.outputs.pypi_name }}
    steps:
      - uses: actions/checkout@v4

      - id: which
        name: Identify package from tag
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Tag: $TAG"
          if [[ "$TAG" == midas-stress-v* ]]; then
            echo "package=midas_stress" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-stress" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-params-v* ]]; then
            echo "package=midas_params" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-params" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-peakfit-v* ]]; then
            echo "package=midas_peakfit" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-peakfit" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-integrate-v* ]]; then
            echo "package=midas_integrate" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-integrate" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-hkls-v* ]]; then
            echo "package=midas_hkls" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-hkls" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-calibrate-v* ]]; then
            echo "package=midas_calibrate" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-calibrate" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-diffract-v* ]]; then
            echo "package=midas_diffract" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-diffract" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-index-v* ]]; then
            echo "package=midas_index" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-index" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-transforms-v* ]]; then
            echo "package=midas_transforms" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-transforms" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-nf-preprocess-v* ]]; then
            echo "package=midas_nf_preprocess" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-nf-preprocess" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-process-grains-v* ]]; then
            echo "package=midas_process_grains" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-process-grains" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-fit-grain-v* ]]; then
            echo "package=midas_fit_grain" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-fit-grain" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-nf-fitorientation-v* ]]; then
            echo "package=midas_nf_fitorientation" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-nf-fitorientation" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-nf-pipeline-v* ]]; then
            echo "package=midas_nf_pipeline" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-nf-pipeline" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-parsl-configs-v* ]]; then
            echo "package=midas_parsl_configs" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-parsl-configs" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == midas-ff-pipeline-v* ]]; then
            echo "package=midas_ff_pipeline" >> "$GITHUB_OUTPUT"
            echo "pypi_name=midas-ff-pipeline" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not match any known package prefix; skipping."
            echo "package=" >> "$GITHUB_OUTPUT"
            echo "pypi_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.which.outputs.package != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        if: steps.which.outputs.package != ''
        run: pip install build

      - name: Build sdist and wheel
        if: steps.which.outputs.package != ''
        run: |
          cd packages/${{ steps.which.outputs.package }}
          python -m build

      - name: Upload artifacts
        if: steps.which.outputs.package != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.which.outputs.pypi_name }}-dist
          path: packages/${{ steps.which.outputs.package }}/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && needs.build.outputs.package != ''
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (OIDC)

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.pypi_name }}-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC). One-time setup per package at pypi.org:
        # Settings > Publishing > Add a new pending publisher
        #   Owner: marinerhemant
        #   Repo: MIDAS
        #   Workflow: python-packages.yml
        #   Environment: pypi
        # The same GitHub environment (pypi) is shared across packages;
        # the PyPI side identifies which project to publish to by the
        # PyPI project name baked into the uploaded dist/*.
